<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maslow's Needs: Full Lifespan</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap');

  :root {
    --bg: #080a0e;
    --physiological: #c95f3a;
    --safety: #c49a30;
    --belonging: #3d9070;
    --esteem: #4a7fc4;
    --self: #9660c8;
    --transcendence: #c060a8;
    --text: #ddd8cc;
    --muted: #484858;
    --line: rgba(255,255,255,0.05);
    --midpoint: rgba(255,255,255,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    padding: 2rem 2.5rem 1.2rem;
    border-bottom: 1px solid var(--line);
  }

  .header-top {
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
    flex-wrap: wrap;
    margin-bottom: 0.6rem;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.6rem, 3vw, 2.4rem);
    font-weight: 300;
    letter-spacing: 0.01em;
    color: var(--text);
  }

  .subtitle {
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  .legend {
    display: flex;
    gap: 1.2rem;
    flex-wrap: wrap;
    margin-top: 0.5rem;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .legend-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .tabs {
    display: flex;
    gap: 0;
    padding: 0 2.5rem;
    border-bottom: 1px solid var(--line);
    margin-top: 1rem;
  }

  .tab {
    padding: 0.6rem 1.2rem;
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: 'DM Mono', monospace;
  }

  .tab.active {
    color: var(--text);
    border-bottom-color: rgba(255,255,255,0.3);
  }

  .tab:hover { color: var(--text); }

  .diagram-container {
    position: relative;
    width: 100%;
    overflow-x: auto;
    padding: 1.5rem 1rem 2rem;
  }

  svg { display: block; margin: 0 auto; }

  .tooltip {
    position: fixed;
    background: #141820;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 5px;
    padding: 0.75rem 1rem;
    max-width: 220px;
    font-size: 0.67rem;
    line-height: 1.65;
    color: var(--text);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.12s;
    z-index: 100;
    box-shadow: 0 12px 40px rgba(0,0,0,0.7);
  }

  .tooltip.visible { opacity: 1; }

  .tooltip-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.95rem;
    font-weight: 400;
    margin-bottom: 0.3rem;
  }

  .tooltip-age {
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    opacity: 0.5;
    margin-bottom: 0.4rem;
    text-transform: uppercase;
  }

  .view { display: none; }
  .view.active { display: block; }

  .insight-bar {
    padding: 0.8rem 2.5rem;
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid var(--line);
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.85rem;
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>The Architecture of a Life</h1>
    <span class="subtitle">Maslow's Hierarchy · Birth to 80+</span>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--physiological)"></div>Physiological</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--safety)"></div>Safety</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--belonging)"></div>Belonging</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--esteem)"></div>Esteem</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--self)"></div>Self-Actualization</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--transcendence)"></div>Transcendence</div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="showView('first')">Birth → 50</button>
  <button class="tab" onclick="showView('second')">50 → 80+</button>
  <button class="tab" onclick="showView('full')">Full Lifespan</button>
</div>

<div class="insight-bar" id="insightBar">
  "We are not going in a circle, we are going upwards. The path is a spiral; we have already climbed many steps." — Hermann Hesse
</div>

<div class="diagram-container">
  <div class="view active" id="view-first">
    <svg id="svg1" viewBox="0 0 1100 660" width="1100" height="660"></svg>
  </div>
  <div class="view" id="view-second">
    <svg id="svg2" viewBox="0 0 1100 660" width="1100" height="660"></svg>
  </div>
  <div class="view" id="view-full">
    <svg id="svg3" viewBox="0 0 2000 660" width="2000" height="660"></svg>
  </div>
</div>

<div class="tooltip" id="tooltip">
  <div class="tooltip-age" id="tt-age"></div>
  <div class="tooltip-title" id="tt-title"></div>
  <div id="tt-body"></div>
</div>

function showView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  document.querySelectorAll('.tab')[['first','second','full'].indexOf(v)].classList.add('active');
  document.getElementById('insightBar').textContent = insights[v];
}

// ── RENDERING ENGINE ─────────────────────────────────────────

const tooltip = document.getElementById('tooltip');

function makeSvgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

function buildDefs(svg) {
  const defs = makeSvgEl('defs', {});
  Object.entries(C).forEach(([tier, color]) => {
    const f = makeSvgEl('filter', { id: `glow-${tier}-${svg.id}`, x:'-60%', y:'-60%', width:'220%', height:'220%' });
    const blur = makeSvgEl('feGaussianBlur', { stdDeviation: '3.5', result: 'coloredBlur' });
    const merge = makeSvgEl('feMerge', {});
    merge.appendChild(makeSvgEl('feMergeNode', { in: 'coloredBlur' }));
    merge.appendChild(makeSvgEl('feMergeNode', { in: 'SourceGraphic' }));
    f.appendChild(blur); f.appendChild(merge);
    defs.appendChild(f);
  });
  svg.appendChild(defs);
}

function drawBackground(svg, phases, W, midX) {
  // Band backgrounds
  const bands = [
    { tier:'physiological', label:'I · PHYSIOLOGICAL' },
    { tier:'safety', label:'II · SAFETY' },
    { tier:'belonging', label:'III · BELONGING' },
    { tier:'esteem', label:'IV · ESTEEM' },
    { tier:'self', label:'V · SELF-ACTUALIZATION' },
    { tier:'transcendence', label:'VI · TRANSCENDENCE' },
  ];

  const bandH = { physiological:68, safety:66, belonging:64, esteem:62, self:60, transcendence:58 };
  const bandY = { physiological:542, safety:430, belonging:318, esteem:208, self:98, transcendence:20 };

  bands.forEach(b => {
    const color = C[b.tier];
    const y = bandY[b.tier], h = bandH[b.tier];
    svg.appendChild(makeSvgEl('rect', {
      x:40, y, width: W - 60, height: h,
      fill: color, opacity:'0.03', rx:'3'
    }));
    const lbl = makeSvgEl('text', {
      x:48, y: y + h - 8,
      fill: color, opacity:'0.3',
      'font-size':'7', 'font-family':'DM Mono, monospace',
      'letter-spacing':'0.14em'
    });
    lbl.textContent = b.label;
    svg.appendChild(lbl);
  });

  // Age gridlines
  phases.forEach(p => {
    svg.appendChild(makeSvgEl('line', {
      x1:p.x, y1:18, x2:p.x, y2:618,
      stroke:'rgba(255,255,255,0.05)', 'stroke-width':'1', 'stroke-dasharray':'2,8'
    }));
    const lbl = makeSvgEl('text', {
      x:p.x, y:636, 'text-anchor':'middle',
      fill:'#2a2a38', 'font-size':'8', 'font-family':'DM Mono, monospace'
    });
    lbl.textContent = p.age === 0 ? 'BIRTH' : `${p.age}`;
    svg.appendChild(lbl);
  });

  // Midpoint divider
  if (midX) {
    svg.appendChild(makeSvgEl('line', {
      x1:midX, y1:15, x2:midX, y2:625,
      stroke:'rgba(255,255,255,0.15)', 'stroke-width':'1.5'
    }));
    const ml = makeSvgEl('text', {
      x:midX+6, y:30, fill:'rgba(255,255,255,0.2)',
      'font-size':'7.5', 'font-family':'DM Mono, monospace', 'letter-spacing':'0.12em'
    });
    ml.textContent = 'INFLECTION';
    svg.appendChild(ml);
  }
}

function drawConnections(svg, nodes, conns) {
  const nodeMap = {};
  nodes.forEach(n => nodeMap[n.id] = n);
  const g = makeSvgEl('g', {});

  conns.forEach(([aId, bId]) => {
    const a = nodeMap[aId], b = nodeMap[bId];
    if (!a || !b) return;
    const ay = TY[a.tier], by = TY[b.tier];
    const sameTier = a.tier === b.tier;
    const color = sameTier ? C[a.tier] : 'rgba(255,255,255,0.15)';
    const sw = sameTier ? '1.8' : '1';
    const dash = sameTier ? 'none' : '3,6';
    const opacity = sameTier ? '0.55' : '0.3';
    const dx = (b.x - a.x) * 0.42;
    g.appendChild(makeSvgEl('path', {
      d: `M ${a.x} ${ay} C ${a.x+dx} ${ay}, ${b.x-dx} ${by}, ${b.x} ${by}`,
      fill:'none', stroke:color, 'stroke-width':sw, 'stroke-dasharray':dash, opacity
    }));
  });
  svg.appendChild(g);
}

function drawNodes(svg, nodes) {
  const nodeMap = {};
  nodes.forEach(n => nodeMap[n.id] = n);
  const g = makeSvgEl('g', {});

  nodes.forEach(n => {
    const color = C[n.tier];
    const y = TY[n.tier];
    const ng = makeSvgEl('g', { transform:`translate(${n.x},${y})`, cursor:'pointer' });

    const ring = makeSvgEl('circle', { r:'10', fill:'none', stroke:color, 'stroke-width':'1', opacity:'0.35' });
    const core = makeSvgEl('circle', { r:'5.5', fill:color, filter:`url(#glow-${n.tier}-${svg.id})`, opacity:'0.9' });

    // Label — alternate above/below to reduce overlap
    const labelY = (n.labelBelow) ? '20' : '-15';
    const lbl = makeSvgEl('text', {
      y:labelY, 'text-anchor':'middle', fill:color,
      'font-size':'7.8', 'font-family':'DM Mono, monospace',
      'letter-spacing':'0.03em', opacity:'0.8'
    });
    lbl.textContent = n.label;

    ng.appendChild(ring);
    ng.appendChild(core);
    ng.appendChild(lbl);

    ng.addEventListener('mouseenter', () => {
      ring.setAttribute('opacity','1'); ring.setAttribute('r','12');
      core.setAttribute('r','7');
      document.getElementById('tt-age').textContent = `AGE ${n.age}`;
      document.getElementById('tt-title').textContent = n.label;
      document.getElementById('tt-body').textContent = n.info;
      tooltip.classList.add('visible');
    });
    ng.addEventListener('mousemove', e => {
      tooltip.style.left = (e.clientX+16)+'px';
      tooltip.style.top  = (e.clientY-20)+'px';
    });
    ng.addEventListener('mouseleave', () => {
      ring.setAttribute('opacity','0.35'); ring.setAttribute('r','10');
      core.setAttribute('r','5.5');
      tooltip.classList.remove('visible');
    });

    g.appendChild(ng);
  });
  svg.appendChild(g);
}

// Pulse at birth node
function addBirthPulse(svg, x, tier) {
  const y = TY[tier];
  const color = C[tier];
  const pc = makeSvgEl('circle', { cx:x, cy:y, r:'8', fill:'none', stroke:color, 'stroke-width':'1', opacity:'0' });
  const a1 = makeSvgEl('animate', { attributeName:'r', from:'8', to:'28', dur:'2.5s', repeatCount:'indefinite' });
  const a2 = makeSvgEl('animate', { attributeName:'opacity', from:'0.5', to:'0', dur:'2.5s', repeatCount:'indefinite' });
  pc.appendChild(a1); pc.appendChild(a2);
  svg.appendChild(pc);
}

// ── BUILD SVG 1 (Birth → 50) ─────────────────────────────────

const svg1 = document.getElementById('svg1');

// ── BUILD SVG 3 (Full: Birth → 80+) ─────────────────────────

const svg3 = document.getElementById('svg3');

const nodes2full = nodes2.map(n => ({ ...n, x: n.x + 1040, id: n.id + '_f' }));

// Connections full
const conns1full = conns1.map(([a,b]) => [a+'_f', b+'_f']);

// Bridge connections at the 50-year midpoint
const bridgeConns = [

];

drawConnections(svg3, allNodesFull, [...conns1full, ...conns2full, ...bridgeConns]);
drawNodes(svg3, allNodesFull);

// Midpoint label
const midLbl = makeSvgEl('text', {

  'font-family':'DM Mono, monospace', 'letter-spacing':'0.1em'

midLbl.textContent = '50 · INFLECTION POINT';
svg3.appendChild(midLbl);
</script>
